name: craftui_mobile
description: AI Website/App UI Generator for mobile creators.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.10.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^17.2.2
  flutter_animate: ^4.5.2
  webview_flutter: ^4.13.1
  clipboard: ^3.0.14
  shared_preferences: ^2.5.5
  uuid: ^4.5.3
  intl: ^0.20.2
  path_provider: ^2.1.5
  share_plus: ^13.1.0
  cross_file: ^0.3.5+2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
